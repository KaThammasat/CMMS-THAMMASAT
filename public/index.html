<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMMS PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js">
function loadAIPage(){
  var h='<div class="phdr"><div class="ptitle">AI Analysis</div></div>';
  h+='<div class="aigrid">';
  [["aiDash","Dashboard Insight","Overall health and recommendations"],
   ["aiAssets","Asset Health Check","Equipment analysis and risks"],
   ["aiWOs","WO Trend Analysis","Patterns and efficiency insights"],
   ["aiParts","Inventory Analysis","Stock and procurement advice"],
   ["aiPM","PM Review","Maintenance schedule effectiveness"],
   ["aiStrategy","Full Strategy","Complete maintenance optimization"]
  ].forEach(function(c){
    h+='<div class="aicard" onclick="'+c[0]+'()"><div style="font-size:28px;margin-bottom:8px">AI</div>';
    h+='<div style="font-size:14px;font-weight:700;color:var(--tx);margin-bottom:4px">'+c[1]+'</div>';
    h+='<div style="font-size:12px;color:var(--tx3)">'+c[2]+'</div></div>';
  });
  h+='</div><div class="aip"><div class="ait">Ask AI About Your Maintenance</div>';
  h+='<div style="display:flex;gap:8px;margin-bottom:10px">';
  h+='<input type="text" class="fi" id="aiQ" placeholder="e.g. Which equipment needs attention?" style="flex:1" onkeydown="if(event.key==='Enter')askAI()">';
  h+='<button class="btn btn-ai" onclick="askAI()">Ask AI</button></div>';
  h+='<div class="aib" id="aiChat">Ask any question about your maintenance operations.</div></div>';
  document.getElementById("pAI").innerHTML=h;
}
function callAI(prompt,elId){
  var el=document.getElementById(elId);if(!el)return;
  el.innerHTML='<div style="color:#4a6080">Analyzing... <span class="ads"><span></span><span></span><span></span></span></div>';
  fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})
  }).then(function(r){return r.json();}).then(function(d){
    if(d.content&&d.content[0]&&d.content[0].text){
      var t=d.content[0].text.replace(/**(.*?)**/g,'<strong style="color:var(--tx)">$1</strong>').replace(/##s*(.*)/g,'<div style="font-weight:700;color:#3d8fff;margin:8px 0 4px">$1</div>');
      el.innerHTML=t;
    }else el.innerHTML='<span style="color:var(--red)">Error: '+(d.error&&d.error.message||JSON.stringify(d))+'</span>';
  }).catch(function(e){el.innerHTML='<span style="color:var(--red)">Error: '+e.message+'</span>';});
}
function getCtx(cb){
  Promise.all([api("/api/kpi/summary"),api("/api/assets"),api("/api/work-orders"),api("/api/spare-parts")]).then(function(r){
    var s=(r[0].summary||r[0])||{};
    var ctx="System KPIs: Total WOs="+s.total+", Open="+s.open+", InProgress="+s.inprog+", Completed="+s.completed+", Overdue="+s.overdue+", Critical="+s.critical+", AvgMTTR="+s.avgMttr+"h
";
    ctx+="Assets("+((Array.isArray(r[1])?r[1]:[]).length)+"): "+(Array.isArray(r[1])?r[1]:[]).map(function(a){return a.code+"("+a.type+",health:"+a.health_score+"%)";}).join(", ")+"
";
    ctx+="LowStock: "+((r[3].parts||[]).filter(function(p){return p.quantity<=p.min_qty;}).map(function(p){return p.name+"("+p.quantity+"/"+p.min_qty+")";}).join(", ")||"none");
    cb(ctx);
  });
}
function showAIResult(title,prompt){
  var existing=document.getElementById("aiResultModal");if(existing)existing.remove();
  var mo=document.createElement("div");mo.id="aiResultModal";
  mo.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px";
  mo.innerHTML='<div style="background:var(--bg2);border:1px solid rgba(157,111,255,.3);border-radius:14px;padding:24px;width:100%;max-width:680px;max-height:85vh;overflow-y:auto"><div style="font-size:16px;font-weight:700;margin-bottom:16px;color:#9d6fff">'+title+'</div><div class="aib" id="aiModalBody">Loading...</div><div style="margin-top:16px;text-align:right"><button class="btn btn-s" onclick="document.getElementById('aiResultModal').remove()">Close</button></div></div>';
  document.body.appendChild(mo);
  mo.addEventListener("click",function(e){if(e.target===mo)mo.remove();});
  callAI(prompt,"aiModalBody");
}
function aiDash(){getCtx(function(ctx){showAIResult("Dashboard Insight","CMMS maintenance expert: Analyze this dashboard and give: 1) Overall health assessment 2) Top 3 concerns 3) Recommended immediate actions. Be concise and practical.

"+ctx);});}
function aiAssets(){getCtx(function(ctx){showAIResult("Asset Health Check","Maintenance engineer: Analyze assets and provide: 1) Critical assets needing attention 2) Replacement recommendations 3) PM priorities

"+ctx);});}
function aiWOs(){getCtx(function(ctx){showAIResult("Work Order Analysis","CMMS expert: Analyze work orders and provide: 1) Efficiency assessment 2) Patterns and recurring issues 3) Staff workload insights 4) Improvement actions

"+ctx);});}
function aiParts(){getCtx(function(ctx){showAIResult("Inventory Analysis","Inventory expert: 1) Stock-out risks 2) Reorder recommendations 3) Cost optimization opportunities

"+ctx);});}
function aiPM(){getCtx(function(ctx){showAIResult("PM Schedule Review","Maintenance planner: 1) PM program effectiveness 2) Overdue items 3) Interval optimization 4) ROI improvements

"+ctx);});}
function aiStrategy(){getCtx(function(ctx){showAIResult("Maintenance Strategy","Senior consultant: Develop strategy with 1) Current maturity assessment 2) 30-day critical actions 3) 90-day improvement plan 4) KPI targets 5) Technology recommendations

"+ctx);});}
function askAI(){var q=(document.getElementById("aiQ")||{}).value||"";if(!q){toast("Please enter a question","err");return;}getCtx(function(ctx){callAI("CMMS maintenance advisor - Answer this question based on system data:

Question: "+q+"

System Data:
"+ctx+"

Provide specific, actionable advice.","aiChat");});}
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--bg2:#0f1629;--bg3:#141e35;--bd:rgba(40,70,140,.4);--bd2:rgba(60,100,200,.5);--tx:#c8d8f0;--tx2:#7a9cc8;--tx3:#4a6888;--blue:#4d9fff;--blue2:#1a5fcc;--green:#00c87a;--amber:#ffb800;--red:#ff3d5a;--cyan:#00e5ff;}
html,body{height:100%;font-family:sans-serif;background:var(--bg);color:var(--tx);font-size:14px}
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh}
.lcard{background:var(--bg2);border:1px solid var(--bd2);border-radius:16px;padding:40px 36px;width:360px;text-align:center}
.logo{font-size:32px;font-weight:800;color:var(--blue);margin-bottom:4px}
.sub{font-size:12px;color:var(--tx3);margin-bottom:28px}
.tabs{display:flex;gap:8px;margin-bottom:20px;background:var(--bg3);border-radius:8px;padding:4px}
.tab{flex:1;padding:8px;border-radius:6px;border:none;background:none;color:var(--tx2);cursor:pointer;font-size:13px}
.tab.active{background:var(--blue2);color:white}
.lbl{font-size:11px;color:var(--tx3);text-align:left;margin-bottom:5px;text-transform:uppercase}
.linput{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;color:var(--tx);font-size:16px;letter-spacing:4px;text-align:center;outline:none;margin-bottom:16px}
.linput:focus{border-color:var(--blue)}
.lbtn{width:100%;padding:12px;background:var(--blue2);border:none;border-radius:8px;color:white;font-size:15px;font-weight:600;cursor:pointer}
.lbtn:hover{background:#1d6be0}
.lerr{color:var(--red);font-size:12px;margin-top:8px;min-height:16px}
.lpub{margin-top:20px;padding-top:16px;border-top:1px solid var(--bd);font-size:12px;color:var(--tx3)}
.lpub a{color:var(--blue);cursor:pointer}
#appPage{display:none;height:100vh;flex-direction:column}
.topbar{background:var(--bg2);border-bottom:1px solid var(--bd);padding:0 20px;height:50px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.alogo{font-size:16px;font-weight:800;color:var(--blue);margin-right:auto}
.clk{font-size:11px;color:var(--cyan);background:var(--bg3);border:1px solid var(--bd);padding:3px 9px;border-radius:4px;font-family:monospace}
.uchip{font-size:12px;color:var(--tx2);background:var(--bg3);border:1px solid var(--bd);padding:4px 10px;border-radius:6px}
.lout{background:none;border:1px solid rgba(255,61,90,.3);border-radius:6px;padding:5px 10px;color:var(--red);cursor:pointer;font-size:12px}
.bwrap{display:flex;flex:1;overflow:hidden}
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--bd);flex-shrink:0;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:var(--tx3);border-left:2px solid transparent;font-size:13px;transition:all .15s}
.ni:hover,.ni.active{background:rgba(77,159,255,.08);color:var(--tx);border-left-color:var(--blue)}
.ni.active{color:var(--blue)}
.content{flex:1;overflow-y:auto;padding:20px}
.page{display:none}.page.active{display:block}
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.kcard{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:16px}
.kval{font-size:28px;font-weight:700;color:var(--blue);margin-bottom:4px}
.kval.green{color:var(--green)}.kval.amber{color:var(--amber)}.kval.red{color:var(--red)}.kval.cyan{color:var(--cyan)}
.klbl{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px}
.twrap{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-top:8px}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:11px;color:var(--tx3);text-transform:uppercase;border-bottom:1px solid var(--bd);background:var(--bg3)}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid rgba(40,70,140,.2)}
tr:hover td{background:rgba(77,159,255,.04)}
.code{color:var(--blue);font-family:monospace}.cyan{color:var(--cyan);font-family:monospace}
.tx2{color:var(--tx2)}.tx3{color:var(--tx3)}.amber{color:var(--amber)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.b-open{background:rgba(77,159,255,.15);color:var(--blue)}.b-inp{background:rgba(255,184,0,.15);color:var(--amber)}
.b-done{background:rgba(0,200,122,.15);color:var(--green)}.b-over{background:rgba(255,61,90,.15);color:var(--red)}
.b-crit{background:rgba(255,61,90,.15);color:var(--red)}.b-high{background:rgba(255,184,0,.15);color:var(--amber)}
.b-med{background:rgba(77,159,255,.15);color:var(--blue)}.b-low{background:rgba(74,104,136,.15);color:var(--tx3)}
.b-act{background:rgba(0,200,122,.15);color:var(--green)}
.qty-ok{color:var(--green);font-weight:700}.qty-low{color:var(--red);font-weight:700}
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.moverlay.active{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bd2);border-radius:12px;padding:24px;width:90%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:18px}
.fg{margin-bottom:14px}.fl{font-size:11px;color:var(--tx3);display:block;margin-bottom:5px;text-transform:uppercase}
.fi,.fsel,.fta{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:9px 12px;color:var(--tx);font-size:13px;outline:none}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--blue)}.fta{resize:vertical;min-height:80px}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.btn{padding:9px 18px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600}
.btn-p{background:var(--blue2);color:white}.btn-p:hover{background:#1d6be0}
.btn-s{background:var(--bg3);color:var(--tx2);border:1px solid var(--bd)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;padding:12px 18px;font-size:13px;z-index:999;transform:translateY(100px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}.toast.ok{border-color:var(--green);color:var(--green)}.toast.err{border-color:var(--red);color:var(--red)}
.phdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.ptitle{font-size:18px;font-weight:700}.sbt{padding:16px;font-weight:700;font-size:13px;color:var(--tx2)}.nodata{text-align:center;padding:40px;color:var(--tx3)}
.aip{background:linear-gradient(135deg,rgba(157,111,255,.08),rgba(61,143,255,.06));border:1px solid rgba(157,111,255,.25);border-radius:12px;padding:18px;margin-bottom:18px}.ait{font-size:14px;font-weight:700;color:#9d6fff;margin-bottom:10px}.aib{background:rgba(0,0,0,.25);border-radius:8px;padding:14px;font-size:13px;line-height:1.7;color:#7a9fc8;min-height:50px;white-space:pre-wrap}.ads span{animation:dk 1.2s infinite;display:inline-block;width:6px;height:6px;border-radius:50%;background:#9d6fff;margin:0 2px}.ads span:nth-child(2){animation-delay:.2s}.ads span:nth-child(3){animation-delay:.4s}@keyframes dk{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1);opacity:1}}.aigrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:18px}.aicard{background:var(--bg2);border:1px solid rgba(157,111,255,.2);border-radius:10px;padding:14px;cursor:pointer;transition:all .2s}.aicard:hover{border-color:rgba(157,111,255,.5)}.btn-ai{background:linear-gradient(135deg,rgba(157,111,255,.2),rgba(61,143,255,.2));color:#9d6fff;border:1px solid rgba(157,111,255,.4)}.btn-ai:hover{background:linear-gradient(135deg,rgba(157,111,255,.3),rgba(61,143,255,.3))}</style></head><body>
<div id="loginPage"><div class="lcard">
<div class="logo">CMMS PRO</div>
<div class="sub">Maintenance Management System v3.0</div>
<div class="tabs">
<button class="tab active" id="tabAdmin" onclick="setRole('admin')">Admin</button>
<button class="tab" id="tabTech" onclick="setRole('tech')">Technician</button>
</div>
<div class="lbl">PIN CODE</div>
<input type="password" id="pinInput" class="linput" placeholder="&bull;&bull;&bull;&bull;" maxlength="8" inputmode="numeric" onkeydown="if(event.key==='Enter')doLogin()">
<button class="lbtn" onclick="doLogin()">Login</button>
<div class="lerr" id="lerr"></div>
<div class="lpub"><a onclick="openModal('pubModal')">Report an Issue (No Login Required)</a></div>
</div></div>
<div id="appPage">
<div class="topbar"><div class="alogo">CMMS PRO</div>
<div class="clk" id="clk">--:--:--</div>
<div class="uchip" id="uchip">User</div>
<button class="lout" onclick="logout()">Logout</button></div>
<div class="bwrap"><div class="sidebar" id="sb"></div>
<div class="content">
<div class="page active" id="pDash"></div>
<div class="page" id="pWO"></div>
<div class="page" id="pAssets"></div>
<div class="page" id="pParts"></div>
<div class="page" id="pPM"></div><div class="page" id="pAI"></div>
</div></div></div>
<div class="moverlay" id="pubModal"><div class="modal">
<h3>Report Maintenance Issue</h3>
<div class="fg"><label class="fl">Issue Title *</label><input type="text" id="pt" class="fi" placeholder="Describe the problem"></div>
<div class="fg"><label class="fl">Your Name</label><input type="text" id="pn" class="fi"></div>
<div class="fg"><label class="fl">Contact</label><input type="text" id="pc" class="fi"></div>
<div class="fg"><label class="fl">Details</label><textarea id="pd" class="fta"></textarea></div>
<div class="mfoot"><button class="btn btn-s" onclick="closeModal('pubModal')">Cancel</button>
<button class="btn btn-p" onclick="submitPub()">Submit</button></div>
</div></div>
<div class="moverlay" id="woModal"><div class="modal">
<h3>Create Work Order</h3>
<div class="fg"><label class="fl">Title *</label><input type="text" id="wt" class="fi"></div>
<div class="fg"><label class="fl">Asset</label><select id="wa" class="fsel"><option value="">-- Select --</option></select></div>
<div class="fg"><label class="fl">Type</label><select id="wty" class="fsel"><option value="reactive">Reactive</option><option value="preventive">Preventive</option><option value="inspection">Inspection</option></select></div>
<div class="fg"><label class="fl">Priority</label><select id="wp" class="fsel"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option><option value="critical">Critical</option></select></div>
<div class="fg"><label class="fl">Assigned To</label><input type="text" id="wass" class="fi"></div>
<div class="fg"><label class="fl">SLA Hours</label><input type="number" id="wsla" class="fi" value="4" min="1"></div>
<div class="fg"><label class="fl">Description</label><textarea id="wd" class="fta"></textarea></div>
<div class="mfoot"><button class="btn btn-s" onclick="closeModal('woModal')">Cancel</button>
<button class="btn btn-p" onclick="submitWO()">Create</button></div>
</div></div>
<div class="toast" id="toast"></div>
<script>
var T=localStorage.getItem("ct")||"";
var R=localStorage.getItem("cr")||"";
var N=localStorage.getItem("cn")||"";
var CR="admin";
if(T){showApp();navTo("Dash");}else{showLogin();}
function setRole(r){CR=r;document.getElementById("tabAdmin").classList.toggle("active",r==="admin");document.getElementById("tabTech").classList.toggle("active",r==="tech");}
function doLogin(){var p=document.getElementById("pinInput").value;if(!p)return;fetch("/api/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({role:CR,pin:p})}).then(function(r){return r.json();}).then(function(d){if(d.token){T=d.token;R=d.role;N=d.name;localStorage.setItem("ct",T);localStorage.setItem("cr",R);localStorage.setItem("cn",N);showApp();navTo("Dash");}else{document.getElementById("lerr").textContent=d.error||"Login failed";}});}
function logout(){T="";R="";N="";localStorage.removeItem("ct");localStorage.removeItem("cr");localStorage.removeItem("cn");showLogin();}
function showLogin(){document.getElementById("loginPage").style.display="flex";document.getElementById("appPage").style.display="none";}
function showApp(){document.getElementById("loginPage").style.display="none";document.getElementById("appPage").style.display="flex";document.getElementById("uchip").textContent=N+" ("+R+")";renderSB();setInterval(function(){document.getElementById("clk").textContent=new Date().toLocaleTimeString("th-TH",{timeZone:"Asia/Bangkok"});},1000);}
function renderSB(){var items=[["Dash","Dashboard"],["WO","Work Orders"],["Assets","Assets"],["Parts","Spare Parts"],["PM","PM Plans"],["AI","AI Analysis"]];var h="<div class=\"sbt\">Navigation</div>";items.forEach(function(i){h+="<div class=\"ni\" id=\"nav"+i[0]+"\" onclick=\"navTo('"+i[0]+"')\">" +i[1]+"</div>";});document.getElementById("sb").innerHTML=h;}
function navTo(p){document.querySelectorAll(".page").forEach(function(x){x.classList.remove("active");});document.querySelectorAll(".ni").forEach(function(x){x.classList.remove("active");});var pg=document.getElementById("p"+p);if(pg)pg.classList.add("active");var nav=document.getElementById("nav"+p);if(nav)nav.classList.add("active");if(p==="Dash")loadDash();if(p==="WO")loadWO();if(p==="Assets")loadAssets();if(p==="Parts")loadParts();if(p==="PM")loadPM();if(p==="AI")loadAIPage();}
function api(path,opts){var o=opts||{};o.headers=o.headers||{};o.headers["Authorization"]="Bearer "+T;o.headers["Content-Type"]="application/json";return fetch(path,o).then(function(r){return r.json();});}
function sb(s){var m={open:"b-open",in_progress:"b-inp",completed:"b-done",overdue:"b-over"};return "<span class=\"badge "+(m[s]||"b-open")+"\">"+s+"</span>";}
function pb(p){var m={critical:"b-crit",high:"b-high",medium:"b-med",low:"b-low"};return "<span class=\"badge "+(m[p]||"b-med")+"\">"+p+"</span>";}
function hc(v){if(v>=80)return "qty-ok";if(v>=50)return "amber";return "qty-low";}
function loadDash(){api("/api/kpi/summary").then(function(k){var s=k.summary||k;var h="<div class=\"phdr\"><div class=\"ptitle\">Dashboard</div></div><div class=\"kgrid\">";h+="<div class=\"kcard\"><div class=\"kval\">"+s.total+"</div><div class=\"klbl\">Total WOs</div></div>";h+="<div class=\"kcard\"><div class=\"kval\">"+s.open+"</div><div class=\"klbl\">Open</div></div>";h+="<div class=\"kcard\"><div class=\"kval amber\">"+s.inprog+"</div><div class=\"klbl\">In Progress</div></div>";h+="<div class=\"kcard\"><div class=\"kval green\">"+s.completed+"</div><div class=\"klbl\">Completed</div></div>";h+="<div class=\"kcard\"><div class=\"kval red\">"+s.overdue+"</div><div class=\"klbl\">Overdue</div></div>";h+="<div class=\"kcard\"><div class=\"kval cyan\">"+s.assets+"</div><div class=\"klbl\">Assets</div></div>";h+="<div class=\"kcard\"><div class=\"kval amber\">"+(s.avgMttr||0)+"h</div><div class=\"klbl\">Avg MTTR</div></div>";h+="<div class=\"kcard\"><div class=\"kval red\">"+s.critical+"</div><div class=\"klbl\">Critical</div></div></div>";h+="<div class=\"twrap\" style=\"padding:16px\"><canvas id=\"kChart\" height=\"100\"></canvas></div>";document.getElementById("pDash").innerHTML=h;if(k.monthly&&k.monthly.length>0){new Chart(document.getElementById("kChart"),{type:"bar",data:{labels:k.monthly.map(function(m){return m.month;}),datasets:[{label:"Total",data:k.monthly.map(function(m){return m.total;}),backgroundColor:"rgba(77,159,255,.3)",borderColor:"#4d9fff",borderWidth:1},{label:"Completed",data:k.monthly.map(function(m){return m.completed;}),backgroundColor:"rgba(0,200,122,.3)",borderColor:"#00c87a",borderWidth:1}]},options:{responsive:true,plugins:{legend:{labels:{color:"#7a9cc8"}}},scales:{x:{ticks:{color:"#4a6888"}},y:{ticks:{color:"#4a6888"}}}}});}});}
function loadWO(){api("/api/work-orders").then(function(wos){var w=Array.isArray(wos)?wos:[];var h="<div class=\"phdr\"><div class=\"ptitle\">Work Orders</div><button class=\"btn btn-p\" onclick=\"openNewWO()\">+ New WO</button></div><div class=\"twrap\"><table><thead><tr><th>WO#</th><th>Title</th><th>Asset</th><th>Priority</th><th>Status</th><th>Assigned</th></tr></thead><tbody>";w.forEach(function(i){h+="<tr><td class=\"code\">"+i.wo_number+"</td><td>"+i.title+"</td><td class=\"tx2\">"+(i.asset_name||"-")+"</td><td>"+pb(i.priority)+"</td><td>"+sb(i.status)+"</td><td>"+(i.assigned_to||"-")+"</td></tr>";});h+="</tbody></table></div>";document.getElementById("pWO").innerHTML=h;});}
function loadAssets(){api("/api/assets").then(function(list){var a=Array.isArray(list)?list:[];var h="<div class=\"phdr\"><div class=\"ptitle\">Assets</div></div><div class=\"twrap\"><table><thead><tr><th>Code</th><th>Name</th><th>Type</th><th>Location</th><th>Status</th><th>Health</th></tr></thead><tbody>";a.forEach(function(i){var sc=i.status==="active"?"b-act":"b-over";h+="<tr><td class=\"cyan\">"+i.code+"</td><td>"+i.name+"</td><td class=\"tx2\">"+i.type+"</td><td>"+(i.location||"-")+"</td><td><span class=\"badge "+sc+"\">"+i.status+"</span></td><td class=\""+hc(i.health_score)+"\">"+i.health_score+"%</td></tr>";});h+="</tbody></table></div>";document.getElementById("pAssets").innerHTML=h;});}
function loadParts(){api("/api/spare-parts").then(function(d){var p=d.parts||[];var h="<div class=\"phdr\"><div class=\"ptitle\">Spare Parts</div><div class=\"tx3\">Low Stock: "+(d.low_stock_count||0)+"</div></div><div class=\"twrap\"><table><thead><tr><th>Part No</th><th>Name</th><th>Category</th><th>Qty</th><th>Min</th><th>Location</th></tr></thead><tbody>";p.forEach(function(i){var qc=i.quantity<=i.min_qty?"qty-low":"qty-ok";h+="<tr><td class=\"cyan\">"+(i.part_no||"-")+"</td><td>"+i.name+"</td><td class=\"tx2\">"+(i.category||"-")+"</td><td class=\""+qc+"\">"+i.quantity+"</td><td class=\"tx3\">"+i.min_qty+"</td><td>"+(i.location||"-")+"</td></tr>";});h+="</tbody></table></div>";document.getElementById("pParts").innerHTML=h;});}
function loadPM(){api("/api/pm-plans").then(function(plans){var p=Array.isArray(plans)?plans:[];var h="<div class=\"phdr\"><div class=\"ptitle\">PM Plans</div></div>";if(p.length===0){h+="<div class=\"nodata\">No PM plans yet</div>";}else{h+="<div class=\"twrap\"><table><thead><tr><th>Title</th><th>Asset</th><th>Frequency</th><th>Last Done</th><th>Next Due</th></tr></thead><tbody>";p.forEach(function(i){h+="<tr><td>"+i.title+"</td><td>"+(i.asset_name||"-")+"</td><td>"+i.frequency_days+" days</td><td>"+(i.last_done||"-")+"</td><td class=\"amber\">"+(i.next_due||"-")+"</td></tr>";});h+="</tbody></table></div>";}document.getElementById("pPM").innerHTML=h;});}
function openNewWO(){api("/api/assets").then(function(list){var a=Array.isArray(list)?list:[];var sel=document.getElementById("wa");var o="<option value=\"\">-- Select Asset --</option>";a.forEach(function(i){o+="<option value=\""+i.id+"\">"+i.code+" - "+i.name+"</option>";});sel.innerHTML=o;document.getElementById("wt").value="";document.getElementById("wd").value="";document.getElementById("wass").value="";document.getElementById("wsla").value="4";openModal("woModal");});}
function submitWO(){var b={title:document.getElementById("wt").value,asset_id:document.getElementById("wa").value||null,type:document.getElementById("wty").value,priority:document.getElementById("wp").value,assigned_to:document.getElementById("wass").value,sla_hours:parseInt(document.getElementById("wsla").value)||4,description:document.getElementById("wd").value};if(!b.title)return toast("Title required","err");api("/api/work-orders",{method:"POST",body:JSON.stringify(b)}).then(function(r){if(r.wo_number){toast("Created: "+r.wo_number,"ok");closeModal("woModal");loadWO();navTo("WO");}else toast(r.error||"Error","err");});}
function submitPub(){var b={title:document.getElementById("pt").value,requester_name:document.getElementById("pn").value,requester_contact:document.getElementById("pc").value,description:document.getElementById("pd").value};if(!b.title)return toast("Please enter title","err");fetch("/api/work-orders",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)}).then(function(r){return r.json();}).then(function(d){if(d.wo_number){toast("Submitted: "+d.wo_number,"ok");closeModal("pubModal");}else toast(d.error||"Error","err");});}
function openModal(id){document.getElementById(id).classList.add("active");}
function closeModal(id){document.getElementById(id).classList.remove("active");}
function toast(msg,type){var t=document.getElementById("toast");t.textContent=msg;t.className="toast show "+(type||"ok");setTimeout(function(){t.classList.remove("show");},3000);}
</script></body></html>
