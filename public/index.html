<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CMMS PRO v3.0</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--bg2:#0f1629;--bg3:#141e35;--bd:rgba(40,70,140,.4);--bd2:rgba(60,100,200,.5);--tx:#c8d8f0;--tx2:#7a9cc8;--tx3:#4a6888;--blue:#4d9fff;--blue2:#1a5fcc;--green:#00c87a;--amber:#ffb800;--red:#ff3d5a;--cyan:#00e5ff}
body{min-height:100vh;font-family:'Segoe UI',Tahoma,sans-serif;background:var(--bg);color:var(--tx);display:flex;align-items:center;justify-content:center}
.card{background:var(--bg2);border:1px solid var(--bd2);border-radius:16px;padding:40px;text-align:center;max-width:400px}
h1{color:var(--blue);font-size:28px;margin-bottom:8px}
p{color:var(--tx3);font-size:14px;margin-bottom:24px}
input{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:12px;color:var(--tx);font-size:16px;letter-spacing:4px;text-align:center;outline:none;margin-bottom:16px}
button{width:100%;padding:12px;background:var(--blue2);border:none;border-radius:8px;color:white;font-size:15px;cursor:pointer}
.err{color:var(--red);font-size:12px;margin-top:8px;min-height:16px}
.pub{margin-top:20px;font-size:12px;color:var(--tx3);cursor:pointer;text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <h1>⚙️ CMMS PRO</h1>
  <p>Maintenance Management System · v3.0</p>
  <div id="tabs" style="display:flex;gap:8px;margin-bottom:20px;background:var(--bg3);border-radius:8px;padding:4px">
    <button onclick="setRole('admin',this)" style="flex:1;background:var(--blue2);border-radius:6px;border:none;color:white;padding:8px;cursor:pointer;font-size:13px">Admin</button>
    <button onclick="setRole('tech',this)" style="flex:1;background:none;border-radius:6px;border:none;color:var(--tx2);padding:8px;cursor:pointer;font-size:13px">Technician</button>
  </div>
  <label style="display:block;font-size:11px;color:var(--tx3);text-align:left;margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px">PIN Code</label>
  <input type="password" id="pin" maxlength="8" placeholder="••••" onkeyup="if(event.key==='Enter')login()">
  <button onclick="login()">เข้าสู่ระบบ</button>
  <div class="err" id="err"></div>
  <div class="pub" onclick="showPublic()">แจ้งซ่อม / ติดตามสถานะ →</div>
</div>
<script>
let role='admin';
function setRole(r,t){role=r;document.querySelectorAll('#tabs button').forEach(b=>{b.style.background='none';b.style.color='var(--tx2)'});t.style.background='var(--blue2)';t.style.color='white';}
async function login(){
  const pin=document.getElementById('pin').value;
  const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({role,pin})});
  const d=await r.json();
  if(r.ok){localStorage.setItem('cmms_token',d.token);localStorage.setItem('cmms_role',d.role);localStorage.setItem('cmms_name',d.name);window.location.href='/';}
  else document.getElementById('err').textContent=d.error||'Login failed';
}
function showPublic(){window.location.href='/?public=1';}
if(localStorage.getItem('cmms_token'))window.location.href='/';
</script>
</body>
</html>
