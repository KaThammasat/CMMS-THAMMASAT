<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMMS PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--bg2:#0f1629;--bg3:#141e35;--bd:rgba(40,70,140,.4);--bd2:rgba(60,100,200,.5);--tx:#c8d8f0;--tx2:#7a9cc8;--tx3:#4a6888;--blue:#4d9fff;--blue2:#1a5fcc;--green:#00c87a;--amber:#ffb800;--red:#ff3d5a;--cyan:#00e5ff;}
html,body{height:100%;font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);font-size:14px}
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at 30% 50%,rgba(26,95,204,.15),transparent 60%),var(--bg)}
.lcard{background:var(--bg2);border:1px solid var(--bd2);border-radius:16px;padding:40px 36px;width:360px;text-align:center}
.logo{font-size:32px;font-weight:800;color:var(--blue);letter-spacing:2px;margin-bottom:4px}
.sub{font-size:12px;color:var(--tx3);margin-bottom:28px}
.tabs{display:flex;gap:8px;margin-bottom:20px;background:var(--bg3);border-radius:8px;padding:4px}
.tab{flex:1;padding:8px;border-radius:6px;border:none;background:none;color:var(--tx2);cursor:pointer;font-size:13px}
.tab.active{background:var(--blue2);color:white}
.lbl{font-size:11px;color:var(--tx3);text-align:left;margin-bottom:5px;text-transform:uppercase;letter-spacing:.8px}
.linput{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;color:var(--tx);font-size:16px;letter-spacing:4px;text-align:center;outline:none;margin-bottom:16px}
.linput:focus{border-color:var(--blue)}
.lbtn{width:100%;padding:12px;background:var(--blue2);border:none;border-radius:8px;color:white;font-size:15px;font-weight:600;cursor:pointer}
.lbtn:hover{background:#1d6be0}
.lerr{color:var(--red);font-size:12px;margin-top:8px;min-height:16px}
.lpub{margin-top:20px;padding-top:16px;border-top:1px solid var(--bd);font-size:12px;color:var(--tx3)}
.lpub a{color:var(--blue);cursor:pointer}
#appPage{display:none;height:100vh;flex-direction:column}
.topbar{background:var(--bg2);border-bottom:1px solid var(--bd);padding:0 20px;height:50px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.alogo{font-size:16px;font-weight:800;color:var(--blue);margin-right:auto}
.clock{font-size:11px;color:var(--cyan);background:var(--bg3);border:1px solid var(--bd);padding:3px 9px;border-radius:4px;font-family:monospace}
.uchip{font-size:12px;color:var(--tx2);background:var(--bg3);border:1px solid var(--bd);padding:4px 10px;border-radius:6px}
.lout{background:none;border:1px solid rgba(255,61,90,.3);border-radius:6px;padding:5px 10px;color:var(--red);cursor:pointer;font-size:12px}
.bwrap{display:flex;flex:1;overflow:hidden}
.sidebar{width:200px;background:var(--bg2);border-right:1px solid var(--bd);flex-shrink:0;overflow-y:auto}
.nsec{padding:10px 16px 4px;font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:1.5px}
.ni{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;color:var(--tx3);border-left:2px solid transparent;font-size:13px;transition:all .15s}
.ni:hover,.ni.active{background:rgba(77,159,255,.08);color:var(--tx);border-left-color:var(--blue)}
.ni.active{color:var(--blue)}
.content{flex:1;overflow-y:auto;padding:20px}
.page{display:none}.page.active{display:block}
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.kcard{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:16px}
.kval{font-size:28px;font-weight:700;color:var(--blue);margin-bottom:4px}
.klbl{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px}
.twrap{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-top:8px}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:11px;color:var(--tx3);text-transform:uppercase;border-bottom:1px solid var(--bd);background:var(--bg3)}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid rgba(40,70,140,.2)}
tr:hover td{background:rgba(77,159,255,.04)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.b-open{background:rgba(77,159,255,.15);color:var(--blue)}
.b-inp{background:rgba(255,184,0,.15);color:var(--amber)}
.b-done{background:rgba(0,200,122,.15);color:var(--green)}
.b-over{background:rgba(255,61,90,.15);color:var(--red)}
.b-crit{background:rgba(255,61,90,.15);color:var(--red)}
.b-high{background:rgba(255,184,0,.15);color:var(--amber)}
.b-med{background:rgba(77,159,255,.15);color:var(--blue)}
.b-low{background:rgba(74,104,136,.15);color:var(--tx3)}
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.moverlay.active{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bd2);border-radius:12px;padding:24px;width:90%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:18px}
.fg{margin-bottom:14px}
.fl{font-size:11px;color:var(--tx3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
.fi,.fsel,.fta{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:7px;padding:9px 12px;color:var(--tx);font-size:13px;outline:none}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--blue)}
.fta{resize:vertical;min-height:80px}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.btn{padding:9px 18px;border-radius:7px;border:none;cursor:pointer;font-size:13px;font-weight:600}
.btn-p{background:var(--blue2);color:white}.btn-p:hover{background:#1d6be0}
.btn-s{background:var(--bg3);color:var(--tx2);border:1px solid var(--bd)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;padding:12px 18px;font-size:13px;z-index:999;transform:translateY(100px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
.phdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.ptitle{font-size:18px;font-weight:700}
</style>
</head>
<body>
<div id="loginPage">
  <div class="lcard">
    <div class="logo">CMMS PRO</div>
    <div class="sub">Maintenance Management System v3.0</div>
    <div class="tabs">
      <button class="tab active" id="tabAdmin" onclick="setRole('admin')">Admin</button>
      <button class="tab" id="tabTech" onclick="setRole('tech')">Technician</button>
    </div>
    <div class="lbl">PIN CODE</div>
    <input type="password" id="pinInput" class="linput" placeholder="••••" maxlength="8" inputmode="numeric" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="lbtn" onclick="doLogin()">Login</button>
    <div class="lerr" id="lerr"></div>
    <div class="lpub"><a onclick="openModal('pubModal')">Report an Issue (No Login Required)</a></div>
  </div>
</div>
<div id="appPage">
  <div class="topbar">
    <div class="alogo">CMMS PRO</div>
    <div class="clock" id="clk">--:--:--</div>
    <div class="uchip" id="uchip">User</div>
    <button class="lout" onclick="logout()">Logout</button>
  </div>
  <div class="bwrap">
    <div class="sidebar" id="sb"></div>
    <div class="content">
      <div class="page active" id="pDash"></div>
      <div class="page" id="pWO"></div>
      <div class="page" id="pAssets"></div>
      <div class="page" id="pParts"></div>
      <div class="page" id="pPM"></div>
    </div>
  </div>
</div>
<!-- PUBLIC MODAL -->
<div class="moverlay" id="pubModal">
  <div class="modal">
    <h3>Report Maintenance Issue</h3>
    <div class="fg"><label class="fl">Issue Title *</label><input type="text" id="pt" class="fi" placeholder="Describe the problem"></div>
    <div class="fg"><label class="fl">Your Name</label><input type="text" id="pn" class="fi"></div>
    <div class="fg"><label class="fl">Contact</label><input type="text" id="pc" class="fi"></div>
    <div class="fg"><label class="fl">Details</label><textarea id="pd" class="fta"></textarea></div>
    <div class="mfoot"><button class="btn btn-s" onclick="closeModal('pubModal')">Cancel</button><button class="btn btn-p" onclick="submitPub()">Submit</button></div>
  </div>
</div>
<!-- NEW WO MODAL -->
<div class="moverlay" id="woModal">
  <div class="modal">
    <h3>Create Work Order</h3>
    <div class="fg"><label class="fl">Title *</label><input type="text" id="wt" class="fi"></div>
    <div class="fg"><label class="fl">Asset</label><select id="wa" class="fsel"><option value="">-- Select --</option></select></div>
    <div class="fg"><label class="fl">Type</label><select id="wty" class="fsel"><option value="reactive">Reactive</option><option value="preventive">Preventive</option><option value="inspection">Inspection</option></select></div>
    <div class="fg"><label class="fl">Priority</label><select id="wp" class="fsel"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option><option value="critical">Critical</option></select></div>
    <div class="fg"><label class="fl">Assigned To</label><input type="text" id="wass" class="fi"></div>
    <div class="fg"><label class="fl">SLA Hours</label><input type="number" id="wsla" class="fi" value="4" min="1"></div>
    <div class="fg"><label class="fl">Description</label><textarea id="wd" class="fta"></textarea></div>
    <div class="mfoot"><button class="btn btn-s" onclick="closeModal('woModal')">Cancel</button><button class="btn btn-p" onclick="submitWO()">Create</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var TOKEN=localStorage.getItem('ct')||'';
var ROLE=localStorage.getItem('cr')||'';
var UNAME=localStorage.getItem('cn')||'';
var curRole='admin';
var assetList=[];

if(TOKEN){showApp();navTo('Dash');}else{showLogin();}

function setRole(r){
  curRole=r;
  document.getElementById('tabAdmin').classList.toggle('active',r==='admin');
  document.getElementById('tabTech').classList.toggle('active',r==='tech');
}
function doLogin(){
  var pin=document.getElementById('pinInput').value;
  if(!pin)return;
  fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({role:curRole,pin:pin})})
  .then(function(r){return r.json();})
  .then(function(d){
    if(d.token){
      TOKEN=d.token;ROLE=d.role;UNAME=d.name;
      localStorage.setItem('ct',TOKEN);localStorage.setItem('cr',ROLE);localStorage.setItem('cn',UNAME);
      showApp();navTo('Dash');
    }else{document.getElementById('lerr').textContent=d.error||'Login failed';}
  });
}
function logout(){
  TOKEN='';ROLE='';UNAME='';
  localStorage.removeItem('ct');localStorage.removeItem('cr');localStorage.removeItem('cn');
  showLogin();
}
function showLogin(){document.getElementById('loginPage').style.display='flex';document.getElementById('appPage').style.display='none';}
function showApp(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('appPage').style.display='flex';
  document.getElementById('uchip').textContent=UNAME+' ('+ROLE+')';
  renderSB();
  setInterval(function(){document.getElementById('clk').textContent=new Date().toLocaleTimeString('th-TH',{timeZone:'Asia/Bangkok'});},1000);
}
function renderSB(){
  var items=[['Dash','Dashboard','Dashboard'],['WO','Work Orders','WO'],['Assets','Assets','Assets'],['Parts','Spare Parts','Parts'],['PM','PM Plans','PM']];
  document.getElementById('sb').innerHTML='<div style="padding:16px;font-weight:700;font-size:13px;color:var(--tx2)">Navigation</div>'+
    items.map(function(i){return '<div class="ni" id="nav'+i[0]+'" onclick="navTo(''+i[0]+'')">'+i[1]+'</div>';}).join('');
}
function navTo(p){
  document.querySelectorAll('.page').forEach(function(x){x.classList.remove('active');});
  document.querySelectorAll('.ni').forEach(function(x){x.classList.remove('active');});
  var pg=document.getElementById('p'+p);
  if(pg)pg.classList.add('active');
  var nav=document.getElementById('nav'+p);
  if(nav)nav.classList.add('active');
  if(p==='Dash')loadDash();
  if(p==='WO')loadWO();
  if(p==='Assets')loadAssets();
  if(p==='Parts')loadParts();
  if(p==='PM')loadPM();
}
function api(path,opts){
  var o=opts||{};
  o.headers=o.headers||{};
  o.headers['Authorization']='Bearer '+TOKEN;
  o.headers['Content-Type']='application/json';
  return fetch(path,o).then(function(r){return r.json();});
}
function sBadge(s){
  var m={open:'b-open',in_progress:'b-inp',completed:'b-done',overdue:'b-over'};
  return '<span class="badge '+(m[s]||'b-open')+'">'+s+'</span>';
}
function pBadge(p){
  var m={critical:'b-crit',high:'b-high',medium:'b-med',low:'b-low'};
  return '<span class="badge '+(m[p]||'b-med')+'">'+p+'</span>';
}
function loadDash(){
  api('/api/kpi/summary').then(function(k){
    var s=k.summary||k;
    var html='<div class="phdr"><div class="ptitle">Dashboard</div></div>';
    html+='<div class="kgrid">';
    html+='<div class="kcard"><div class="kval">'+(s.total||0)+'</div><div class="klbl">Total WOs</div></div>';
    html+='<div class="kcard"><div class="kval" style="color:var(--blue)">'+(s.open||0)+'</div><div class="klbl">Open</div></div>';
    html+='<div class="kcard"><div class="kval" style="color:var(--amber)">'+(s.inprog||0)+'</div><div class="klbl">In Progress</div></div>';
    html+='<div class="kcard"><div class="kval" style="color:var(--green)">'+(s.completed||0)+'</div><div class="klbl">Completed</div></div>';
    html+='<div class="kcard"><div class="kval" style="color:var(--red)">'+(s.overdue||0)+'</div><div class="klbl">Overdue</div></div>';
    html+='<div class="kcard"><div class="kval" style="color:var(--cyan)">'+(s.assets||0)+'</div><div class="klbl">Active Assets</div></div>';
    html+='<div class="kcard"><div class="kval" style="color:var(--amber)">'+(s.avgMttr||0)+'h</div><div class="klbl">Avg MTTR</div></div>';
    html+='<div class="kcard"><div class="kval" style="color:var(--red)">'+(s.critical||0)+'</div><div class="klbl">Critical Open</div></div>';
    html+='</div>';
    html+='<div style="background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:16px"><canvas id="kChart" height="100"></canvas></div>';
    document.getElementById('pDash').innerHTML=html;
    if(k.monthly&&k.monthly.length>0){
      new Chart(document.getElementById('kChart'),{
        type:'bar',
        data:{
          labels:k.monthly.map(function(m){return m.month;}),
          datasets:[
            {label:'Total',data:k.monthly.map(function(m){return m.total;}),backgroundColor:'rgba(77,159,255,.3)',borderColor:'#4d9fff',borderWidth:1},
            {label:'Completed',data:k.monthly.map(function(m){return m.completed;}),backgroundColor:'rgba(0,200,122,.3)',borderColor:'#00c87a',borderWidth:1}
          ]
        },
        options:{responsive:true,plugins:{legend:{labels:{color:'#7a9cc8'}}},scales:{x:{ticks:{color:'#4a6888'}},y:{ticks:{color:'#4a6888'}}}}
      });
    }
  });
}
function loadWO(){
  api('/api/work-orders').then(function(wos){
    var wlist=Array.isArray(wos)?wos:[];
    var html='<div class="phdr"><div class="ptitle">Work Orders</div><button class="btn btn-p" onclick="openNewWO()">+ New WO</button></div>';
    html+='<div class="twrap"><table><thead><tr><th>WO#</th><th>Title</th><th>Asset</th><th>Priority</th><th>Status</th><th>Assigned</th></tr></thead><tbody>';
    wlist.forEach(function(w){
      html+='<tr><td style="color:var(--blue);font-family:monospace">'+w.wo_number+'</td><td>'+w.title+'</td><td style="color:var(--tx2)">'+(w.asset_name||'-')+'</td><td>'+pBadge(w.priority)+'</td><td>'+sBadge(w.status)+'</td><td>'+(w.assigned_to||'-')+'</td></tr>';
    });
    html+='</tbody></table></div>';
    document.getElementById('pWO').innerHTML=html;
  });
}
function loadAssets(){
  api('/api/assets').then(function(list){
    var alist=Array.isArray(list)?list:[];
    var html='<div class="phdr"><div class="ptitle">Assets</div></div>';
    html+='<div class="twrap"><table><thead><tr><th>Code</th><th>Name</th><th>Type</th><th>Location</th><th>Status</th><th>Health</th></tr></thead><tbody>';
    alist.forEach(function(a){
      var hc=a.health_score>=80?'var(--green)':a.health_score>=50?'var(--amber)':'var(--red)';
      html+='<tr><td style="color:var(--cyan);font-family:monospace">'+a.code+'</td><td>'+a.name+'</td><td>'+a.type+'</td><td>'+(a.location||'-')+'</td><td><span class="badge '+(a.status==='active'?'b-done':'b-over')+'">'+a.status+'</span></td><td style="color:'+hc+'">'+a.health_score+'%</td></tr>';
    });
    html+='</tbody></table></div>';
    document.getElementById('pAssets').innerHTML=html;
  });
}
function loadParts(){
  api('/api/spare-parts').then(function(d){
    var parts=d.parts||[];
    var html='<div class="phdr"><div class="ptitle">Spare Parts</div><div style="font-size:12px;color:var(--tx3)">Low Stock: '+(d.low_stock_count||0)+'</div></div>';
    html+='<div class="twrap"><table><thead><tr><th>Part No</th><th>Name</th><th>Category</th><th>Qty</th><th>Min</th><th>Location</th></tr></thead><tbody>';
    parts.forEach(function(p){
      var qc=p.quantity<=p.min_qty?'var(--red)':'var(--green)';
      html+='<tr><td style="color:var(--cyan);font-family:monospace">'+(p.part_no||'-')+'</td><td>'+p.name+'</td><td>'+(p.category||'-')+'</td><td style="color:'+qc+';font-weight:700">'+p.quantity+'</td><td style="color:var(--tx3)">'+p.min_qty+'</td><td>'+(p.location||'-')+'</td></tr>';
    });
    html+='</tbody></table></div>';
    document.getElementById('pParts').innerHTML=html;
  });
}
function loadPM(){
  api('/api/pm-plans').then(function(plans){
    var plist=Array.isArray(plans)?plans:[];
    var html='<div class="phdr"><div class="ptitle">PM Plans</div></div>';
    if(plist.length===0){html+='<div style="text-align:center;padding:40px;color:var(--tx3)">No PM plans yet</div>';}
    else{
      html+='<div class="twrap"><table><thead><tr><th>Title</th><th>Asset</th><th>Frequency</th><th>Last Done</th><th>Next Due</th></tr></thead><tbody>';
      plist.forEach(function(p){
        html+='<tr><td>'+p.title+'</td><td>'+(p.asset_name||'-')+'</td><td>'+p.frequency_days+' days</td><td>'+(p.last_done||'-')+'</td><td style="color:var(--amber)">'+(p.next_due||'-')+'</td></tr>';
      });
      html+='</tbody></table></div>';
    }
    document.getElementById('pPM').innerHTML=html;
  });
}
function openNewWO(){
  api('/api/assets').then(function(list){
    assetList=Array.isArray(list)?list:[];
    var sel=document.getElementById('wa');
    sel.innerHTML='<option value="">-- Select Asset --</option>'+assetList.map(function(a){return '<option value="'+a.id+'">'+a.code+' - '+a.name+'</option>';}).join('');
    document.getElementById('wt').value='';
    document.getElementById('wd').value='';
    document.getElementById('wass').value='';
    document.getElementById('wsla').value='4';
    openModal('woModal');
  });
}
function submitWO(){
  var body={title:document.getElementById('wt').value,asset_id:document.getElementById('wa').value||null,type:document.getElementById('wty').value,priority:document.getElementById('wp').value,assigned_to:document.getElementById('wass').value,sla_hours:parseInt(document.getElementById('wsla').value)||4,description:document.getElementById('wd').value};
  if(!body.title)return toast('Title required','err');
  api('/api/work-orders',{method:'POST',body:JSON.stringify(body)}).then(function(r){
    if(r.wo_number){toast('Created: '+r.wo_number,'ok');closeModal('woModal');loadWO();navTo('WO');}
    else toast(r.error||'Error','err');
  });
}
function submitPub(){
  var body={title:document.getElementById('pt').value,requester_name:document.getElementById('pn').value,requester_contact:document.getElementById('pc').value,description:document.getElementById('pd').value};
  if(!body.title)return toast('Please enter title','err');
  fetch('/api/work-orders',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(function(r){return r.json();}).then(function(d){
    if(d.wo_number){toast('Submitted: '+d.wo_number,'ok');closeModal('pubModal');}
    else toast(d.error||'Error','err');
  });
}
function openModal(id){document.getElementById(id).classList.add('active');}
function closeModal(id){document.getElementById(id).classList.remove('active');}
function toast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='toast show '+(type||'ok');
  setTimeout(function(){t.classList.remove('show');},3000);
}
</script>
</body>
</html>
