version: '3.9'

services:
  # ─── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cmms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cmms_thammasat
      POSTGRES_USER: cmms_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cmms_secure_password_2024}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmms_user -d cmms_thammasat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cmms_net

  # ─── Redis (Session & Cache) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cmms_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-cmms_redis_2024}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - cmms_net

  # ─── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: cmms_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cmms_thammasat
      DB_USER: cmms_user
      DB_PASSWORD: ${DB_PASSWORD:-cmms_secure_password_2024}
      DB_POOL_MAX: 20
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-cmms_redis_2024}
      JWT_SECRET: ${JWT_SECRET:-cmms_jwt_secret_change_in_production_must_be_32chars}
      JWT_EXPIRES: 8h
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      LOG_LEVEL: info
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cmms_net

  # ─── Frontend (React) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000/api/v1}
        REACT_APP_SOCKET_URL: ${REACT_APP_SOCKET_URL:-http://localhost:5000}
    container_name: cmms_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - cmms_net

  # ─── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cmms_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - cmms_net

  # ─── Prometheus (Monitoring) ──────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: cmms_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - cmms_net
    profiles: ["monitoring"]

  # ─── Grafana (Dashboards) ─────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: cmms_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-cmms_grafana_2024}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - cmms_net
    profiles: ["monitoring"]

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  cmms_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
