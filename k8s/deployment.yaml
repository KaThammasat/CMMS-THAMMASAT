# ============================================================
# CMMS Thammasat - Kubernetes Deployment
# kubectl apply -f k8s/
# ============================================================

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: cmms
  labels:
    app: cmms-thammasat

---
# ConfigMap - non-secret config
apiVersion: v1
kind: ConfigMap
metadata:
  name: cmms-config
  namespace: cmms
data:
  NODE_ENV: "production"
  PORT: "5000"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "cmms_thammasat"
  DB_POOL_MAX: "20"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  JWT_EXPIRES: "8h"
  LOG_LEVEL: "info"

---
# Secret - sensitive values (base64 encoded)
apiVersion: v1
kind: Secret
metadata:
  name: cmms-secrets
  namespace: cmms
type: Opaque
stringData:
  DB_PASSWORD: "cmms_secure_password_change_me"
  REDIS_PASSWORD: "cmms_redis_password_change_me"
  JWT_SECRET: "cmms_jwt_secret_change_in_production_at_least_32_chars"

---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: cmms
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: cmms-config
                  key: DB_NAME
            - name: POSTGRES_USER
              value: cmms_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cmms-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "cmms_user"]
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: cmms
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None  # Headless for StatefulSet

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: cmms
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cmms-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: cmms
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmms-backend
  namespace: cmms
  labels:
    app: cmms-backend
    version: "5.0"
spec:
  replicas: 2  # HA: 2 backend instances
  selector:
    matchLabels:
      app: cmms-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cmms-backend
        version: "5.0"
    spec:
      containers:
        - name: backend
          image: ghcr.io/kathammasat/cmms-thammasat/backend:latest
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: cmms-config
            - secretRef:
                name: cmms-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: logs
          emptyDir: {}

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: cmms
spec:
  selector:
    app: cmms-backend
  ports:
    - port: 5000
      targetPort: 5000

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmms-frontend
  namespace: cmms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cmms-frontend
  template:
    metadata:
      labels:
        app: cmms-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/kathammasat/cmms-thammasat/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: cmms
spec:
  selector:
    app: cmms-frontend
  ports:
    - port: 80
      targetPort: 80

---
# Ingress (nginx-ingress-controller required)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cmms-ingress
  namespace: cmms
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    # WebSocket support for Socket.IO
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - cmms.thammasat.ac.th
      secretName: cmms-tls
  rules:
    - host: cmms.thammasat.ac.th
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          - path: /socket.io
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80

---
# Horizontal Pod Autoscaler for backend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cmms-backend-hpa
  namespace: cmms
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cmms-backend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
