server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        return 404;
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;
}
